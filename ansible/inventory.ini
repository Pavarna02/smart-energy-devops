# ansible/inventory.ini
# Replace the IP address and key path with your actual server details.
#
# For AWS EC2:  ansible_user=ubuntu, ansible_ssh_private_key_file=~/.ssh/my-key.pem
# For local VM: ansible_host=192.168.x.x

[devops_servers]
smart-energy-server ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[devops_servers:vars]
ansible_python_interpreter=/usr/bin/python3
